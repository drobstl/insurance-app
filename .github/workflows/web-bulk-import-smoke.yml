name: Web Bulk Import Smoke

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-bulk-import-smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/web-bulk-import-smoke.yml'

jobs:
  bulk-import-smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run bulk import smoke tests
        run: npm run test:bulk-import-smoke
