name: Web E2E

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-e2e.yml'
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/web-e2e.yml'

jobs:
  e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          # E2E signs in as a DEDICATED bot account (deardanielroberts+e2e@…),
          # not a human login. It is deliberately kept WITHOUT an enrolled
          # second factor so sign-in is a clean password → dashboard, and the
          # five functional specs (bulk/single-file import) test what they're
          # about without auth friction.
          AFL_E2E_EMAIL: ${{ secrets.AFL_E2E_EMAIL }}
          AFL_E2E_PASSWORD: ${{ secrets.AFL_E2E_PASSWORD }}
          # NOTE: mandatory two-step (June 15) is intentionally NOT exercised
          # here. The sign-in SMS challenge uses Firebase's invisible reCAPTCHA,
          # which cannot complete in a headless CI browser (it hangs before any
          # network call — verified in run 27310089989). Enrollment DOES work
          # headlessly and was proven once in that run. Durably testing either
          # per-run would require resetting the bot account's factors before
          # each run, i.e. the Firebase admin key as a CI secret — a security
          # tradeoff we chose not to take. Two-step is covered by real agents
          # in prod (real reCAPTCHA) + the compliance session's prod rehearsal.
          # The MFA-aware bits below stay dormant (helper falls back to plain
          # password sign-in when AFL_E2E_MFA_* are unset); to turn full MFA
          # coverage on later, see the opt-in note in web/e2e/helpers/auth.ts.
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 14
